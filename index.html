function renderFormattedText(content) {
  const parts = content.split(/(\*\*.*?\*\*)/g);
  return parts.map(part => {
    if (part.startsWith("**") && part.endsWith("**")) {
      const span = document.createElement("strong");
      span.textContent = part.slice(2, -2).trim();
      return span;
    }
    const span = document.createElement("span");
    span.textContent = part;
    return span;
  });
}

function renderProposal(text) {
  const container = document.createElement("div");
  const lines = text.split("\n");

  lines.forEach(line => {
    const trimmed = line.trim();
    if (trimmed.startsWith("# ")) {
      const h2 = document.createElement("h2");
      h2.textContent = trimmed.replace("# ", "");
      h2.className = "sectionTitle";
      container.appendChild(h2);
    } else if (trimmed.startsWith("## ")) {
      const h3 = document.createElement("h3");
      h3.textContent = trimmed.replace("## ", "");
      h3.className = "subTitle";
      container.appendChild(h3);
    } else if (trimmed.startsWith("### ")) {
      const h4 = document.createElement("h4");
      h4.textContent = trimmed.replace("### ", "");
      h4.className = "subTitle";
      container.appendChild(h4);
    } else if (trimmed.startsWith("- ") || trimmed.startsWith("* ")) {
      const div = document.createElement("div");
      div.className = "listItem";
      renderFormattedText(trimmed.substring(2).trim()).forEach(e => div.appendChild(e));
      container.appendChild(div);
    } else if (trimmed === "") {
      container.appendChild(document.createElement("br"));
    } else {
      const p = document.createElement("p");
      p.className = "paragraph";
      renderFormattedText(line).forEach(e => p.appendChild(e));
      container.appendChild(p);
    }
  });

  return container;
}
