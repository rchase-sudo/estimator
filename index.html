<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Civil Engineering Proposal Generator</title>
<style>
  body { 
    margin:0; 
    font-family: Inter, system-ui, sans-serif; 
    background:#0a0a0a; 
    color:white; 
    padding:40px 20px; 
  }
  .container { max-width:1200px; margin:0 auto; }
  h1 { font-size:32px; font-weight:700; }
  .pmBadge { background:#222; padding:8px 18px; border-radius:9999px; font-size:15px; margin-left:20px; }
  .mainGrid { display:grid; grid-template-columns:380px 1fr; gap:30px; }
  .card { background:#151515; border-radius:16px; padding:32px; }
  .formGroup { margin-bottom:24px; }
  label { display:block; margin-bottom:8px; font-size:14px; color:#aaa; font-weight:500; }
  input, textarea { 
    width:100%; 
    padding:14px 16px; 
    background:#222; 
    border:none; 
    border-radius:10px; 
    color:white; 
    font-size:16px; 
  }
  textarea { 
    resize: vertical; 
    min-height: 420px; 
    line-height: 1.6;
  }
  button { 
    cursor:pointer; 
    border:none; 
    border-radius:12px; 
    font-weight:700; 
    font-size:16px; 
  }
  #generateButton { 
    width:100%; 
    padding:16px; 
    background:#4ade80; 
    color:#0a0a0a; 
    margin-top:20px; 
    font-size:17px;
  }
  #proposalCard { min-height:600px; display:flex; flex-direction:column; }
  #proposalHeader { 
    display:flex; 
    justify-content:space-between; 
    align-items:center; 
    margin-bottom:24px; 
    border-bottom:1px solid #222; 
    padding-bottom:16px; 
  }
  #copyButton { 
    padding:10px 20px; 
    background:#333; 
    color:white; 
    border-radius:9999px; 
    font-size:14px; 
  }
  #proposalContent { 
    flex:1; 
    overflow-y:auto; 
    line-height:1.75; 
    padding-right:8px; 
  }
  .sectionTitle { font-size:24px; font-weight:700; margin:32px 0 16px 0; color:#4ade80; }
  .subTitle { font-size:20px; font-weight:600; margin:24px 0 12px 0; color:#ddd; }
  .paragraph { margin-bottom:14px; white-space:pre-wrap; }
  .listItem { margin-bottom:10px; padding-left:4px; }
  .emptyState { 
    height:100%; 
    display:flex; 
    align-items:center; 
    justify-content:center; 
    text-align:center; 
    color:#666; 
    font-style:italic; 
  }
  .error { color:#ff6b6b; margin-top:12px; text-align:center; }
</style>
</head>
<body>
<div class="container">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:40px;">
    <h1>AI Materials & Quantities Estimator</h1>
    <div class="pmBadge">Powered by Apollo • Estimator Mode</div>
  </div>

  <div class="mainGrid">
    <!-- Input Form -->
    <div class="card">
      <h2 style="font-size:22px; margin-bottom:24px; font-weight:600;">Project Information</h2>

        <div class="formGroup">
        <label><strong>Materials & Quantities</strong></label>
        <textarea id="materialsQuantities" placeholder="Provide detailed information about the project including:
• Materials required
• Estimated quantities"></textarea>
      </div>

      

      <button id="generateButton">Generate Report</button>
      <p class="error" id="errorMsg" style="display:none;"></p>
    </div>

    <!-- Proposal Output -->
    <div class="card" id="proposalCard">
      <div id="proposalHeader">
        <h2 style="font-size:22px; font-weight:600;">Generated Report</h2>
        <button id="copyButton" style="display:none;">📋 Copy to Clipboard</button>
      </div>
      <div id="proposalContent">
        <div class="emptyState">Fill out the project details on the left and click "Generate Report" to create a professional civil engineering report.</div>
      </div>
    </div>
  </div>
</div>

<script>
const GEMINI_API_KEY = "AIzaSyCI3LvTxw6GtqnNghArKuGf_xxDrC7aTLk";

function renderFormattedText(content) {
  const parts = content.split(/(\*\*.*?\*\*)/g);
  return parts.map(part => {
    if (part.startsWith("**") && part.endsWith("**")) {
      const span = document.createElement("strong");
      span.textContent = part.slice(2, -2).trim();
      return span;
    }
    const span = document.createElement("span");
    span.textContent = part;
    return span;
  });
}

function renderProposal(text) {
  const container = document.createElement("div");
  const lines = text.split("\n");

  lines.forEach(line => {
    const trimmed = line.trim();
    if (trimmed.startsWith("# ")) {
      const h2 = document.createElement("h2");
      h2.textContent = trimmed.replace("# ", "");
      h2.className = "sectionTitle";
      container.appendChild(h2);
    } else if (trimmed.startsWith("## ")) {
      const h3 = document.createElement("h3");
      h3.textContent = trimmed.replace("## ", "");
      h3.className = "subTitle";
      container.appendChild(h3);
    } else if (trimmed.startsWith("- ") || trimmed.startsWith("* ")) {
      const div = document.createElement("div");
      div.className = "listItem";
      renderFormattedText(trimmed.substring(2).trim()).forEach(e => div.appendChild(e));
      container.appendChild(div);
    } else if (trimmed === "") {
      container.appendChild(document.createElement("br"));
    } else {
      const p = document.createElement("p");
      p.className = "paragraph";
      renderFormattedText(line).forEach(e => p.appendChild(e));
      container.appendChild(p);
    }
  });

  return container;
}

document.getElementById("generateButton").addEventListener("click", async () => {
  const projectName = document.getElementById("materialsQuants").value.trim();

  if (!projectName || !clientName) {
    document.getElementById("errorMsg").style.display = "block";
    document.getElementById("errorMsg").textContent = "Project Name and Client Name are required.";
    return;
  }

  document.getElementById("errorMsg").style.display = "none";
  const contentDiv = document.getElementById("proposalContent");
  contentDiv.innerHTML = "Generating Report...";

  const systemPrompt = `
You are a Materials Takeoff and Cost Reporting Engine. Your sole function is to convert raw input data (materials, descriptions, quantities, and unit prices) into a fully structured, professional, copy-paste-ready cost report.

NON-NEGOTIABLE RULES
You MUST follow this format exactly. No deviation, no creativity, no alternative layouts.
You MUST NOT omit any item provided by the user.
You MUST NOT invent materials, quantities, or prices.
You MUST NOT summarize or paraphrase input data.
You MUST calculate all totals precisely.
You MUST ensure all grouping is logical and consistent.
Output must be ready to paste into a Word or Google Docs document.
INPUT FORMAT YOU WILL RECEIVE

You will be given a list of materials in any format, including:

Material name
Quantity
Unit (if provided)
Unit price (if provided)

Example input:

Asphalt 2" - 500 tons - $85/ton
Gravel Base - 1200 tons - $35/ton
Pipe 12" PVC - 300 LF - $12/LF
OUTPUT FORMAT (STRICT TEMPLATE)
MATERIALS & COST REPORT

1. ITEMIZED MATERIAL BREAKDOWN

Each material MUST be grouped by type/category if similar (e.g., aggregates, piping, asphalt, concrete, miscellaneous).

[Category Name]

Item: [Material Name]

Quantity: X [unit]
Unit Price: $X.XX per [unit]
Subtotal: $X.XX

(Repeat for each item in category)

Category Subtotal: $X.XX

2. CATEGORY TOTALS
[Category Name 1]: $X.XX
[Category Name 2]: $X.XX
[Category Name 3]: $X.XX

3. GRAND TOTAL
TOTAL PROJECT COST: $X.XX
CALCULATION RULES
Subtotal = Quantity × Unit Price
Category Total = Sum of all subtotals in category
Grand Total = Sum of all category totals
Round currency to 2 decimal places

FORMATTING RULES
Use consistent indentation
Use bold only for headers and totals
Do not include explanations
Do not include commentary
Do not add extra sections beyond this structure
Maintain professional engineering / estimating tone

FINAL OUTPUT REQUIREMENT
Your response must contain ONLY the completed report. No preface. No explanation. No notes

${materialsQuants}
`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ role: "user", parts: [{ text: systemPrompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 4096 }
      })
    });

    if (!response.ok) throw new Error("API request failed");
    const data = await response.json();
    const aiReply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't generate the proposal.";

    contentDiv.innerHTML = "";
    contentDiv.appendChild(renderProposal(aiReply));

    const copyBtn = document.getElementById("copyButton");
    copyBtn.style.display = "inline-block";
    copyBtn.onclick = () => navigator.clipboard.writeText(aiReply);

  } catch(err) {
    console.error(err);
    document.getElementById("errorMsg").style.display = "block";
    document.getElementById("errorMsg").textContent = "Error generating proposal. Please try again.";
  }
});
</script>
</body>
</html>
